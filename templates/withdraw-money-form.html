<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Money - Sai Ganesh Bank</title>
    <style>
        :root {
            --bg: #eef4fb;
            --surface: #ffffff;
            --primary: #1f4b8f;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 20px;
            --shadow: 0 24px 80px rgba(31, 75, 143, 0.12);
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .form-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            color: var(--text);
        }

        .form-header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* --- NEW ERROR BOX STYLING --- */
        .error-box {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 14px;
            border-radius: 12px;
            border-left: 5px solid #ef4444;
            margin-bottom: 24px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
        }

        .input-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
        }

        input {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(31, 75, 143, 0.15);
            background: var(--surface);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            background: #15366b;
        }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .cancel-link:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    
    <div class="form-card">
        <div class="form-header">
            <div style="font-size: 3rem; margin-bottom: 12px;">🏧</div>
            <h1>Withdraw Cash</h1>
            <p>Securely withdraw funds from your account.</p>
        </div>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}
        
        <form action="/dashboard/withdraw-money" method="post">
            
            <div class="input-group">
                <label for="amount">Amount to Withdraw (₹):</label>
                <input type="number" id="amount" name="amount" step="0.01" min="1" placeholder="Enter amount..." required>
            </div>
            
            <button type="submit" class="btn-submit">Withdraw Funds</button>
        </form>
        
        <a href="javascript:history.back()" class="cancel-link">Cancel and return to Dashboard</a>
    </div>

</body>
</html>
