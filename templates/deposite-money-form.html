<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(79,70,229,0.18), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(16,185,129,0.18), transparent 28%),
                        #eef4fb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1f2937;
        }
        .card {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(31, 75, 143, 0.12);
            overflow: hidden;
        }
        .hero {
            background: linear-gradient(135deg, #1f4b8f 0%, #2963c6 100%);
            color: white;
            padding: 32px 28px;
        }
        .hero h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .hero p {
            margin: 0;
            opacity: 0.88;
            line-height: 1.6;
        }
        .form-body {
            padding: 30px 30px 40px;
        }
        .field-group {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }
        label {
            font-weight: 700;
            color: #1f2937;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #d1d5db;
            font-size: 1rem;
            color: #111827;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        button {
            width: 100%;
            border: none;
            background: #1f4b8f;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        button:hover {
            background: #1a3d77;
            transform: translateY(-1px);
        }
        .message {
            padding: 16px 18px;
            border-radius: 14px;
            margin-bottom: 18px;
            border-left: 5px solid;
        }
        .message.error {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #ef4444;
        }
        .message.info {
            background: #e0f2fe;
            color: #0c4a6e;
            border-color: #38bdf8;
        }
        .link-row {
            text-align: center;
            margin-top: 18px;
        }
        .link-row a {
            color: #1f4b8f;
            text-decoration: none;
            font-weight: 600;
        }
        .link-row a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="hero">
            <h1>Deposit Funds</h1>
            <p>Quickly add money to your account with secure verification.</p>
        </div>
        <div class="form-body">
            {% if error %}
                <div class="message error">{{ error }}</div>
            {% endif %}
            <form action="/dashboard/deposite-money" method="post">
                <div class="field-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="1" placeholder="0.00" required>
                </div>
                <button type="submit">Deposit Now</button>
            </form>
            <div class="link-row">
                <a href="javascript:history.back()">Return to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
