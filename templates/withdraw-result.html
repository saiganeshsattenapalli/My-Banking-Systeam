<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Result - Sai Ganesh Bank</title>
    <style>
        body { font-family: Inter, system-ui, sans-serif; background: #eef4fb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 24px;}
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 24px 80px rgba(31,75,143,0.12); text-align: center; max-width: 400px; width: 100%; border: 1px solid #e5e7eb;}
        .icon { font-size: 4rem; margin-bottom: 16px; }
        .btn-home { display: inline-block; margin-top: 24px; padding: 14px 24px; background: #1f4b8f; color: white; text-decoration: none; border-radius: 12px; font-weight: 600; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h2 style="margin: 0 0 8px; color: #1f2937;">Transaction Successful</h2>
        <p style="color: #6b7280; margin: 0;">{{ message }}</p>
        
        <a href="/dashboard/" class="btn-home">Return to Dashboard</a>
    </div>
</body>
</html>
