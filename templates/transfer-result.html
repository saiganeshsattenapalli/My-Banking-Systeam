<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Successful - Saiganesh Bank</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(25, 118, 210, 0.15);
            text-align: center;
            overflow: hidden;
        }

        .success-header {
            background-color: #4caf50; /* Success Green */
            color: white;
            padding: 30px 20px;
        }

        .success-header .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .success-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .success-body {
            padding: 40px 30px;
        }

        /* The dynamic message passed from your Python route */
        .message-box {
            background-color: #f4f9ff;
            border: 1px solid #e3f2fd;
            padding: 20px;
            border-radius: 12px;
            color: #0d47a1;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background-color: #1976d2;
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-home:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-header">
            <div class="icon">✅</div>
            <h1>Transfer Complete</h1>
            <p style="opacity: 0.9;">Transaction processed securely</p>
        </div>

        <div class="success-body">
            
            <div class="message-box">
                {{ message }}
            </div>

            <a href="/dashboard/" class="btn-home">Return to Home</a>
        </div>
    </div>

</body>
</html>
