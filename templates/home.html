<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sai Ganesh Bank - Smart Banking</title>
    <style>
        /* --- CSS STYLING (The Look & Feel) --- */
        :root {
            --primary: #004aad; /* Bank Blue */
            --secondary: #007bff;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text);
        }

        /* --- HOME PAGE CONTAINER --- */
        .container {
            background: var(--white);
            padding: 2.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        /* Standard Button Styling */
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            box-sizing: border-box;
        }

        .btn:hover {
            background: var(--secondary);
            border-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
        }

        /* Secondary Button (Contact Us) */
        .btn-secondary {
            background: var(--white);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(0, 74, 173, 0.05);
            color: var(--primary);
            border-color: var(--primary);
        }

        .footer-text {
            font-size: 12px;
            color: #888;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">🏦</div>
        <h2>Sai Ganesh Bank</h2>
        <p style="color: #666; font-size: 14px;">Smart AI Banking</p>
        
        <div class="button-group">
            <a href="/login-form" class="btn">Login</a> 
            <a href="/create-account-form" class="btn">Create Account</a>
            <a href="/contact-form" class="btn btn-secondary">Contact Us</a> 
        </div>

        <p class="footer-text">Protected by our AI Fraud Detection</p>
    </div>

</body>
</html>
