<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Complete - Sai Ganesh Bank</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(79,70,229,0.18), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(16,185,129,0.18), transparent 28%),
                        #eef4fb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1f2937;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(31, 75, 143, 0.12);
            overflow: hidden;
            text-align: center;
        }
        .header {
            padding: 30px 24px;
            background: linear-gradient(135deg, #10b981 0%, #22c55e 100%);
            color: white;
        }
        .header .icon {
            font-size: 54px;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 6px;
        }
        .header p {
            opacity: 0.92;
            font-size: 0.95rem;
        }
        .content {
            padding: 32px 30px 40px;
        }
        .message-box {
            background: #f4f9ff;
            border: 1px solid #dbeafe;
            color: #1e3a8a;
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 26px;
            font-size: 1rem;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-block;
            width: 100%;
            background: #1f4b8f;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .btn-home:hover {
            background: #193f78;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon">✅</div>
            <h1>Deposit Successful</h1>
            <p>Your balance has been updated.</p>
        </div>
        <div class="content">
            <div class="message-box">
                {{ message }}
            </div>
            <a href="/dashboard/" class="btn-home">Return to Dashboard</a>
        </div>
    </div>
</body>
</html>
