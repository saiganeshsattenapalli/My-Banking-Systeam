<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money - Saiganesh Bank</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(25, 118, 210, 0.15);
            width: 100%;
            max-width: 450px;
        }

        .form-container h2 {
            color: #0d47a1;
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        form { display: flex; flex-direction: column; gap: 15px; }

        label {
            font-weight: 600;
            color: #1565c0;
            font-size: 14px;
            margin-bottom: -10px; 
        }

        input, select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 5px rgba(25, 118, 210, 0.3);
        }

        button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
        }

        /* Error Message Box */
        .error-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #c62828;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        .cancel-link {
            text-align: center;
            margin-top: 15px;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        
        .cancel-link:hover { color: #d32f2f; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-container">
        <div style="font-size: 40px; text-align: center; margin-bottom: 10px;">💸</div>
        <h2>Transfer Money</h2>
        <p class="subtitle">Securely send funds to any account.</p>
        
        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form action="/dashboard/transfer-money" method="post">
            
            <label for="receiver_acc">Receiver's Account Number:</label>
            <input type="number" id="receiver_acc" name="receiver_acc" placeholder="e.g. 1234567890" required>
            
            <label for="amount">Amount (₹):</label>
            <input type="number" step="0.01" id="amount" name="amount" min="1" placeholder="0.00" required>

            <label for="method">Transfer Method:</label>
            <select id="method" name="method" required>
                <option value="Online Banking">Online Banking</option>
                <option value="UPI Transfer">UPI Transfer</option>
                <option value="NEFT">NEFT</option>
                <option value="IMPS">IMPS</option>
            </select>

            <label for="note">Note (Optional):</label>
            <input type="text" id="note" name="note" placeholder="What is this for?">
            
            <button type="submit">Confirm Transfer</button>
        </form>
        
        <a href="javascript:history.back()" class="cancel-link">Cancel and return Home</a>
    </div>

</body>
</html>
