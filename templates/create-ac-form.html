<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Saiganesh Bank</title>
    <style>
        /* 1. Reset standard browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. Elegant light blue background to match the bank theme */
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }

        /* 3. The Registration Card */
        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(25, 118, 210, 0.15);
            width: 100%;
            max-width: 450px; /* Slightly wider for the registration form */
        }

        .register-container h2 {
            color: #0d47a1;
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
        }

        /* 4. Form Layout */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        label {
            font-weight: 600;
            color: #1565c0;
            font-size: 14px;
            margin-bottom: -10px; 
        }

        input[type="text"],
        input[type="password"] {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 5px rgba(25, 118, 210, 0.3);
        }

        /* 5. Error Message Styling (For your FastAPI backend) */
        .error-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #c62828;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        /* 6. Submit Button */
        input[type="submit"] {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3);
        }

        /* 7. Login Link */
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            color: #1976d2;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Create Account</h2>
        
        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form action="/create-account" method="post">
            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
            
            <label for="user_id">User ID:</label>
            <input type="text" id="user_id" name="user_id" placeholder="Choose a unique User ID" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
            
            <input type="submit" value="Create Account">
        </form>

        <div class="login-link">
            Already have an account? <a href="/login-form">Login here</a>
        </div>
    </div>
    
</body>
</html>
